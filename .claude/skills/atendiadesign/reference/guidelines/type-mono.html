<!-- @dsCard group="Type" viewport="700x150" name="Mono — JetBrains Mono" subtitle="Numbers, codes, flow nodes & metrics" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px 22px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .m { font-family: var(--font-mono); color: var(--text-strong); }
  .chip { background: var(--surface-sunken); border:1px solid var(--border-default); border-radius: var(--radius-sm); padding:6px 10px; font-family:var(--font-mono); font-size:13px; color:var(--text-body); }
  .lbl { font-family: var(--font-sans); font-size:11px; color:var(--text-muted); margin-bottom:10px; }
</style></head>
<body>
  <div class="lbl">Para cifras, IDs, horarios y nodos de flujo n8n — nunca para texto corrido.</div>
  <div class="row">
    <span class="m" style="font-size:28px;font-weight:600">$ 24.500</span>
    <span class="m" style="font-size:20px">+54 9 11 5555-1234</span>
    <span class="chip">turno_id: 0A8F-2291</span>
    <span class="chip">09:30 → 10:00</span>
    <span class="chip">webhook ▸ laravel ▸ reply</span>
  </div>
</body></html>
