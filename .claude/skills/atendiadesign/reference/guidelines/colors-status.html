<!-- @dsCard group="Colors" viewport="700x150" name="Status colors" subtitle="success · warning · danger · info (solid + soft)" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 18px; background: var(--surface-page); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .solid { height: 46px; border-radius: var(--radius-md); display:flex; align-items:center; padding:0 12px; color:#fff; font-weight:700; font-size:13px; }
  .soft { height: 34px; border-radius: var(--radius-sm); display:flex; align-items:center; padding:0 12px; font-weight:600; font-size:12px; }
  .h { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }
</style></head>
<body>
  <div class="grid">
    <div class="col">
      <div class="solid" style="background:var(--success)">Success</div>
      <div class="soft" style="background:var(--success-soft);color:var(--success)">Soft bg</div>
      <span class="h">#16A34A</span>
    </div>
    <div class="col">
      <div class="solid" style="background:var(--warning)">Warning</div>
      <div class="soft" style="background:var(--warning-soft);color:var(--warning)">Soft bg</div>
      <span class="h">#F59E0B</span>
    </div>
    <div class="col">
      <div class="solid" style="background:var(--danger)">Danger</div>
      <div class="soft" style="background:var(--danger-soft);color:var(--danger)">Soft bg</div>
      <span class="h">#E5484D</span>
    </div>
    <div class="col">
      <div class="solid" style="background:var(--info)">Info</div>
      <div class="soft" style="background:var(--info-soft);color:var(--info)">Soft bg</div>
      <span class="h">#3B82F6</span>
    </div>
  </div>
</body></html>
