<!-- @dsCard group="Colors" viewport="700x172" name="Accent — Coral" subtitle="Warm accent · --coral-50 → 900" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 18px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 64px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,.05); }
  .n { font-size: 11px; font-weight: 700; color: var(--text-strong); }
  .h { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }
  .lead { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .dot { width:14px;height:14px;border-radius:50%;background:var(--accent); }
  .title { font-weight:700; color:var(--text-strong); font-size:13px; }
  .sub { color:var(--text-muted); font-size:12px; }
</style></head>
<body>
  <div class="lead"><span class="dot"></span><span class="title">Coral</span><span class="sub">— acento cálido. Energía, calidez, CTAs de marketing. Usar con moderación.</span></div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--coral-50)"></div><span class="n">50</span><span class="h">#FFF1ED</span></div>
    <div class="sw"><div class="chip" style="background:var(--coral-100)"></div><span class="n">100</span><span class="h">#FFE0D6</span></div>
    <div class="sw"><div class="chip" style="background:var(--coral-200)"></div><span class="n">200</span><span class="h">#FFC2AF</span></div>
    <div class="sw"><div class="chip" style="background:var(--coral-300)"></div><span class="n">300</span><span class="h">#FF9C7E</span></div>
    <div class="sw"><div class="chip" style="background:var(--coral-400)"></div><span class="n">400</span><span class="h">#FF7E5A</span></div>
    <div class="sw"><div class="chip" style="background:var(--coral-500);outline:2px solid var(--coral-700);outline-offset:2px"></div><span class="n">500 ●</span><span class="h">#FF6A4D</span></div>
    <div class="sw"><div class="chip" style="background:var(--coral-600)"></div><span class="n">600</span><span class="h">#ED4A2B</span></div>
    <div class="sw"><div class="chip" style="background:var(--coral-700)"></div><span class="n">700</span><span class="h">#C5371C</span></div>
    <div class="sw"><div class="chip" style="background:var(--coral-800)"></div><span class="n">800</span><span class="h">#9B2D18</span></div>
    <div class="sw"><div class="chip" style="background:var(--coral-900)"></div><span class="n">900</span><span class="h">#7A2715</span></div>
  </div>
</body></html>
