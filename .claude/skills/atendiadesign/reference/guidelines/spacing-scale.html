<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing scale" subtitle="4px base grid · --space-1 → 24" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 18px 22px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display:flex; align-items:center; gap:14px; padding:5px 0; }
  .bar { height: 16px; background: var(--brand); border-radius: 4px; }
  .name { font-family: var(--font-mono); font-size:11px; color:var(--text-strong); width:90px; }
  .px { font-family: var(--font-mono); font-size:11px; color:var(--text-muted); width:48px; }
</style></head>
<body>
  <div class="row"><span class="name">space-1</span><span class="px">4px</span><span class="bar" style="width:var(--space-1)"></span></div>
  <div class="row"><span class="name">space-2</span><span class="px">8px</span><span class="bar" style="width:var(--space-2)"></span></div>
  <div class="row"><span class="name">space-3</span><span class="px">12px</span><span class="bar" style="width:var(--space-3)"></span></div>
  <div class="row"><span class="name">space-4</span><span class="px">16px</span><span class="bar" style="width:var(--space-4)"></span></div>
  <div class="row"><span class="name">space-6</span><span class="px">24px</span><span class="bar" style="width:var(--space-6)"></span></div>
  <div class="row"><span class="name">space-8</span><span class="px">32px</span><span class="bar" style="width:var(--space-8)"></span></div>
  <div class="row"><span class="name">space-12</span><span class="px">48px</span><span class="bar" style="width:var(--space-12)"></span></div>
  <div class="row"><span class="name">space-16</span><span class="px">64px</span><span class="bar" style="width:var(--space-16)"></span></div>
</body></html>
