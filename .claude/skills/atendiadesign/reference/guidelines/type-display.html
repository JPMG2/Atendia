<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px 22px; background: var(--surface-page); }
  .spec { display:flex; align-items:baseline; gap:14px; border-bottom:1px solid var(--border-subtle); padding:10px 0; }
  .meta { font-family: var(--font-mono); font-size:10px; color:var(--text-subtle); width:120px; flex-shrink:0; }
  .d { font-family: var(--font-display); color: var(--text-strong); letter-spacing:-0.02em; line-height:1.1; }
</style></head>
<body>
  <div class="spec"><span class="meta">7xl · 800</span><span class="d" style="font-size:var(--text-5xl);font-weight:800">Automatizá tu WhatsApp</span></div>
  <div class="spec"><span class="meta">4xl · 700</span><span class="d" style="font-size:var(--text-4xl);font-weight:700">Atendé sin estar</span></div>
  <div class="spec"><span class="meta">2xl · 700</span><span class="d" style="font-size:var(--text-2xl);font-weight:700">Tu negocio, siempre disponible</span></div>
  <div class="spec"><span class="meta">xl · 600</span><span class="d" style="font-size:var(--text-xl);font-weight:600">Turnos, productos y respuestas</span></div>
</body></html>
