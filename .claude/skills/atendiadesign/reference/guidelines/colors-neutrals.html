<!-- @dsCard group="Colors" viewport="700x172" name="Neutrals — Ink" subtitle="Greenish slate · --ink-0 → 950" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 18px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 64px; border-radius: var(--radius-md); border: 1px solid var(--border-default); }
  .n { font-size: 11px; font-weight: 700; color: var(--text-strong); }
  .h { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }
  .lead { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .title { font-weight:700; color:var(--text-strong); font-size:13px; }
  .sub { color:var(--text-muted); font-size:12px; }
</style></head>
<body>
  <div class="lead"><span class="title">Ink</span><span class="sub">— neutros con sutil matiz verde-pizarra. Texto, superficies y bordes.</span></div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-0)"></div><span class="n">0</span><span class="h">#FFFFFF</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-50)"></div><span class="n">50</span><span class="h">#F6F8F8</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-100)"></div><span class="n">100</span><span class="h">#EDF1F1</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-200)"></div><span class="n">200</span><span class="h">#DEE5E4</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-300)"></div><span class="n">300</span><span class="h">#C4CFCD</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-400)"></div><span class="n">400</span><span class="h">#9AA8A6</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><span class="n">500</span><span class="h">#6E7C7A</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><span class="n">700</span><span class="h">#3B4645</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><span class="n">900</span><span class="h">#141A19</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-950)"></div><span class="n">950</span><span class="h">#0B0F0F</span></div>
  </div>
</body></html>
