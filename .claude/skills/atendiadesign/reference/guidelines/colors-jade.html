<!-- @dsCard group="Colors" viewport="700x172" name="Brand — Jade" subtitle="Primary scale · --jade-50 → 950" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 18px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 64px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,.05); }
  .n { font-size: 11px; font-weight: 700; color: var(--text-strong); }
  .h { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }
  .lead { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .dot { width:14px;height:14px;border-radius:50%;background:var(--brand); }
  .title { font-weight:700; color:var(--text-strong); font-size:13px; }
  .sub { color:var(--text-muted); font-size:12px; }
</style></head>
<body>
  <div class="lead"><span class="dot"></span><span class="title">Jade</span><span class="sub">— color primario de marca. Confianza + conversación.</span></div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--jade-50)"></div><span class="n">50</span><span class="h">#E9FBF4</span></div>
    <div class="sw"><div class="chip" style="background:var(--jade-100)"></div><span class="n">100</span><span class="h">#C7F4E2</span></div>
    <div class="sw"><div class="chip" style="background:var(--jade-200)"></div><span class="n">200</span><span class="h">#95EACB</span></div>
    <div class="sw"><div class="chip" style="background:var(--jade-300)"></div><span class="n">300</span><span class="h">#5BDBAF</span></div>
    <div class="sw"><div class="chip" style="background:var(--jade-400)"></div><span class="n">400</span><span class="h">#25C490</span></div>
    <div class="sw"><div class="chip" style="background:var(--jade-500);outline:2px solid var(--jade-700);outline-offset:2px"></div><span class="n">500 ●</span><span class="h">#0EA47A</span></div>
    <div class="sw"><div class="chip" style="background:var(--jade-600)"></div><span class="n">600</span><span class="h">#0A8765</span></div>
    <div class="sw"><div class="chip" style="background:var(--jade-700)"></div><span class="n">700</span><span class="h">#0A6B50</span></div>
    <div class="sw"><div class="chip" style="background:var(--jade-800)"></div><span class="n">800</span><span class="h">#0B5440</span></div>
    <div class="sw"><div class="chip" style="background:var(--jade-900)"></div><span class="n">900</span><span class="h">#0A4233</span></div>
  </div>
</body></html>
